<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Studio Journal - Picpong Backoffice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..700;1,300..600&family=Hanken+Grotesk:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="css/backoffice.css" />
  <style>
    /* journal manager - list of daily posts */
    .jr-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .jr-tab {
      font: inherit; font-weight: 600; font-size: 0.88rem; cursor: pointer;
      padding: 0.45rem 0.9rem; border-radius: 999px;
      border: 1.5px solid var(--bo-line); background: var(--bo-surface); color: var(--ink);
    }
    .jr-tab:hover { border-color: var(--ink); }
    .jr-tab[aria-pressed="true"] { background: var(--bo-orange-tint); border-color: var(--bo-orange); color: var(--bo-orange); }
    .jr-tab .ct { opacity: 0.7; font-weight: 700; }
    .jr-head-actions { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
    .jr-head-actions .bo-topbar__spacer { margin-inline-start: auto; }
    .jr-thumb { width: 54px; height: 54px; border-radius: 8px; object-fit: cover; flex: none; background: var(--kraft); }
    .jr-titles { display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; }
    .jr-title-en { font-weight: 600; }
    .jr-title-he { font-size: 0.9rem; color: var(--muted); }
    .jr-videotag {
      display: inline-flex; align-items: center; gap: 0.28rem; margin-inline-start: 0.4rem;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      padding: 0.1rem 0.4rem; border-radius: 5px; background: var(--ink); color: var(--cream); vertical-align: middle;
    }
    .jr-rowactions { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; justify-content: flex-end; }
    .jr-move { display: flex; flex-direction: column; gap: 2px; }
    .jr-iconbtn {
      width: 30px; height: 30px; border-radius: 7px; display: grid; place-items: center;
      border: 1.5px solid var(--bo-line); background: var(--bo-surface); color: var(--ink); cursor: pointer;
    }
    .jr-iconbtn:hover:not(:disabled) { border-color: var(--ink); }
    .jr-iconbtn:disabled { opacity: 0.35; cursor: not-allowed; }
    .jr-iconbtn svg { width: 15px; height: 15px; }
    .bo-table td.jr-actions-cell { text-align: end; }
  </style>
</head>
<body>
  <script src="js/bo.js"></script>
  <script>
    (function () {
      var session = BO.requireRole(["Admin", "Content"]);
      if (!session) return;
      var main = BO.mountShell({ active: "journal.html", title: "Studio Journal" });
      var esc = BO.esc;
      var filter = "all";

      var upSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>';
      var downSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
      var videoSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>';

      // newest first by date
      function sorted() {
        return BO.getPosts().slice().sort(function (a, b) { return a.date < b.date ? 1 : a.date > b.date ? -1 : 0; });
      }

      function render() {
        var all = sorted();
        var counts = {
          all: all.length,
          published: all.filter(function (p) { return p.status === "published"; }).length,
          draft: all.filter(function (p) { return p.status === "draft"; }).length
        };
        var list = all.filter(function (p) {
          return filter === "all" ? true : filter === "published" ? p.status === "published" : p.status === "draft";
        });

        var head =
          '<div class="bo-pagehead"><h1>Studio Journal</h1>' +
          '<p>Every published post appears in the site journal feed, newest first. Keep the daily rhythm - one short bilingual note, Hebrew and English side by side.</p></div>';

        var actions =
          '<div class="jr-head-actions">' +
            '<span style="color:var(--muted);font-weight:600;font-size:0.9rem">' + counts.all + ' posts &middot; ' + counts.draft + ' in draft</span>' +
            '<span class="bo-topbar__spacer"></span>' +
            '<a class="bo-btn bo-btn--brand" href="journal-editor.html">' + BO.ICON.journal + ' New post</a>' +
          '</div>';

        function tab(key, label) {
          return '<button class="jr-tab" type="button" data-tab="' + key + '" aria-pressed="' + (filter === key) + '">' +
            esc(label) + ' <span class="ct">' + counts[key] + '</span></button>';
        }
        var tabs = '<div class="jr-tabs" role="group" aria-label="Filter posts">' +
          tab("all", "All") + tab("published", "Published") + tab("draft", "Drafts") + '</div>';

        var body;
        if (!list.length) {
          body = '<div class="bo-card"><div class="bo-empty">' +
            (filter === "draft" ? "No drafts - everything is published." :
             filter === "published" ? "Nothing published yet." : "No posts yet.") +
            '<div style="margin-top:1rem"><a class="bo-btn bo-btn--brand" href="journal-editor.html">' + BO.ICON.journal + ' Write the first post</a></div>' +
            '</div></div>';
        } else {
          var rows = list.map(function (p, i) {
            // move is relative to the FULL sorted list, not the filtered view
            var idxInAll = all.indexOf(p);
            var canUp = idxInAll > 0;
            var canDown = idxInAll < all.length - 1;
            return '<tr>' +
              '<td><img class="jr-thumb" src="' + esc(p.image) + '" alt="" /></td>' +
              '<td style="white-space:nowrap;color:var(--muted);font-weight:600">' + esc(BO.fmtDate(p.date)) + '</td>' +
              '<td><div class="jr-titles">' +
                '<span class="jr-title-en">' + esc(p.en.title || "(no English title)") +
                  (p.isVideo ? '<span class="jr-videotag">' + videoSvg + ' Video</span>' : '') + '</span>' +
                '<span class="jr-title-he" dir="rtl">' + esc(p.he.title || "(אין כותרת בעברית)") + '</span>' +
              '</div></td>' +
              '<td><span class="' + BO.pillClass(p.status) + '">' + esc(p.status) + '</span></td>' +
              '<td class="jr-actions-cell"><div class="jr-rowactions">' +
                '<a class="bo-btn bo-btn--ghost bo-btn--sm" href="journal-editor.html?id=' + encodeURIComponent(p.id) + '">Edit</a>' +
                '<button class="bo-btn bo-btn--sm" type="button" data-toggle="' + esc(p.id) + '">' +
                  (p.status === "published" ? "Unpublish" : "Publish") + '</button>' +
                '<span class="jr-move">' +
                  '<button class="jr-iconbtn" type="button" data-move="up" data-id="' + esc(p.id) + '" aria-label="Move up" ' + (canUp ? "" : "disabled") + '>' + upSvg + '</button>' +
                  '<button class="jr-iconbtn" type="button" data-move="down" data-id="' + esc(p.id) + '" aria-label="Move down" ' + (canDown ? "" : "disabled") + '>' + downSvg + '</button>' +
                '</span>' +
              '</div></td>' +
            '</tr>';
          }).join("");
          body = '<div class="bo-tablewrap"><table class="bo-table">' +
            '<thead><tr><th></th><th>Date</th><th>Title (HE / EN)</th><th>Status</th><th style="text-align:end">Actions</th></tr></thead>' +
            '<tbody>' + rows + '</tbody></table></div>';
        }

        main.innerHTML = head + actions + tabs + body;
        wire();
      }

      function wire() {
        Array.prototype.forEach.call(main.querySelectorAll("[data-tab]"), function (b) {
          b.addEventListener("click", function () { filter = b.getAttribute("data-tab"); render(); });
        });
        Array.prototype.forEach.call(main.querySelectorAll("[data-toggle]"), function (b) {
          b.addEventListener("click", function () {
            var p = BO.getPost(b.getAttribute("data-toggle"));
            if (!p) return;
            p.status = p.status === "published" ? "draft" : "published";
            BO.savePost(p);
            BO.toast(p.status === "published" ? "Post <b>published</b>" : "Moved back to <b>draft</b>");
            render();
          });
        });
        Array.prototype.forEach.call(main.querySelectorAll("[data-move]"), function (b) {
          b.addEventListener("click", function () {
            move(b.getAttribute("data-id"), b.getAttribute("data-move"));
          });
        });
      }

      // reorder by swapping the date with the neighbour in the sorted list (honest for a mockup)
      function move(id, dir) {
        var all = sorted();
        var i = -1;
        all.forEach(function (p, idx) { if (p.id === id) i = idx; });
        var j = dir === "up" ? i - 1 : i + 1;
        if (i < 0 || j < 0 || j >= all.length) return;
        var a = all[i], b = all[j];
        var tmp = a.date; a.date = b.date; b.date = tmp;
        BO.savePost(a); BO.savePost(b);
        BO.toast("Order updated");
        render();
      }

      render();
    })();
  </script>
</body>
</html>
