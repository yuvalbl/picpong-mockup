<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Journal editor - Picpong Backoffice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..700;1,300..600&family=Hanken+Grotesk:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="css/backoffice.css" />
  <style>
    /* journal editor - bilingual daily post */
    .je-topline { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
    .je-topline .sp { margin-inline-start: auto; }
    .je-back { color: var(--bo-orange); font-weight: 600; text-decoration: none; font-size: 0.9rem; }
    .je-back:hover { text-decoration: underline; }
    .je-grid { display: grid; grid-template-columns: 1fr; gap: 1.2rem; }
    .je-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
    @media (max-width: 760px) { .je-cols { grid-template-columns: 1fr; } }
    .je-langcard { border: 1.5px solid var(--bo-line); border-radius: var(--bo-radius); padding: 1.1rem 1.15rem; background: var(--bo-surface); }
    .je-langcard h3 {
      font-family: "Rubik", system-ui, sans-serif; font-weight: 500; font-size: 1rem; margin: 0 0 0.9rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .je-langtag { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.14rem 0.45rem; border-radius: 5px; background: var(--bo-orange-tint); color: var(--bo-orange); }
    /* image picker */
    .je-imggrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 0.6rem; }
    .je-imgopt {
      position: relative; border: 2px solid var(--bo-line); border-radius: 9px; overflow: hidden; cursor: pointer;
      background: none; padding: 0; aspect-ratio: 4 / 3;
    }
    .je-imgopt img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .je-imgopt:hover { border-color: var(--ink); }
    .je-imgopt[aria-pressed="true"] { border-color: var(--bo-orange); box-shadow: 0 0 0 3px rgba(177,78,15,0.18); }
    .je-imgopt[aria-pressed="true"]::after {
      content: "\2713"; position: absolute; top: 4px; inset-inline-end: 4px;
      width: 20px; height: 20px; border-radius: 999px; background: var(--bo-orange); color: #fff;
      font-size: 0.78rem; font-weight: 700; display: grid; place-items: center;
    }
    .je-imgcap { position: absolute; left: 0; right: 0; bottom: 0; font-size: 0.66rem; padding: 0.15rem 0.3rem; background: rgba(26,26,26,0.62); color: #fff; }
    /* video toggle */
    .je-check { display: flex; align-items: center; gap: 0.6rem; font-weight: 600; font-size: 0.95rem; cursor: pointer; }
    .je-check input { width: 18px; height: 18px; accent-color: var(--bo-orange); }
    /* parity warning */
    .je-warn {
      display: none; margin-bottom: 1rem; padding: 0.8rem 1rem; border-radius: var(--bo-radius-sm);
      background: #FBE7E0; border: 1.5px solid #C0492A; color: #7A2A15; font-size: 0.9rem; font-weight: 600;
    }
    .je-warn.show { display: block; }
    .je-actions { display: flex; gap: 0.7rem; flex-wrap: wrap; margin-top: 0.4rem; }
    /* preview modal */
    .je-modal { position: fixed; inset: 0; z-index: 400; display: none; place-items: center; padding: 1.5rem; background: rgba(26,26,26,0.55); }
    .je-modal.show { display: grid; }
    .je-modal__card {
      width: min(720px, 100%); max-height: 88vh; overflow-y: auto;
      background: var(--bo-bg); border-radius: var(--bo-radius); box-shadow: 0 24px 60px rgba(0,0,0,0.35); padding: 1.4rem;
    }
    .je-modal__head { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1rem; }
    .je-modal__head h2 { font-family: "Rubik", system-ui, sans-serif; font-weight: 500; font-size: 1.2rem; margin: 0; }
    .je-modal__tag { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.18rem 0.5rem; border-radius: 999px; background: var(--bo-orange-tint); color: var(--bo-orange); }
    .je-modal__close { margin-inline-start: auto; }
    .je-modal__grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 620px) { .je-modal__grid { grid-template-columns: 1fr; } }
    /* feed card preview - echoes the marketing journal card */
    .je-feed { background: var(--bo-surface); border: 1px solid var(--bo-line); border-radius: var(--bo-radius); overflow: hidden; }
    .je-feed__img { width: 100%; aspect-ratio: 3 / 2; object-fit: cover; display: block; background: var(--kraft); }
    .je-feed__body { padding: 1rem 1.1rem 1.2rem; }
    .je-feed__eyebrow { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .je-feed__title { font-family: "Rubik", system-ui, sans-serif; font-weight: 500; font-size: 1.15rem; line-height: 1.2; margin: 0.4rem 0 0.6rem; }
    .je-feed__lines { margin: 0; padding: 0; list-style: none; color: var(--muted); font-size: 0.95rem; line-height: 1.5; }
    .je-feed__lines li { margin-bottom: 0.2rem; }
    .je-feed__vid { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 0.1rem 0.4rem; border-radius: 5px; background: var(--ink); color: var(--cream); margin-inline-start: 0.4rem; }
  </style>
</head>
<body>
  <script src="js/bo.js"></script>
  <script>
    (function () {
      var session = BO.requireRole(["Admin", "Content"]);
      if (!session) return;
      var main = BO.mountShell({ active: "journal.html", title: "Journal editor" });
      var esc = BO.esc;

      var params = new URLSearchParams(location.search);
      var id = params.get("id");
      var isNew = !id;

      var post;
      if (isNew) {
        post = defaultPost();
      } else {
        post = BO.getPost(id);
        if (!post) { renderNotFound(); return; }
      }

      // selectable site assets for the image picker (real project photos)
      var IMAGES = [
        { src: "../assets/projects/microsoft.jpg",       label: "Microsoft" },
        { src: "../assets/projects/landa.jpg",           label: "Landa" },
        { src: "../assets/projects/king-solomon.jpg",    label: "King Solomon" },
        { src: "../assets/projects/google-cloud.jpg",    label: "Google Cloud" },
        { src: "../assets/projects/synamedia.jpg",       label: "Synamedia" },
        { src: "../assets/projects/deep-instinct.jpg",   label: "Deep Instinct" },
        { src: "../assets/projects/bluevine.jpg",        label: "BlueVine" },
        { src: "../assets/projects/redefine-meat.jpg",   label: "Redefine Meat" },
        { src: "../assets/projects/priority-maccabi.jpg",label: "Priority" },
        { src: "../assets/projects/meetmind.jpg",        label: "Meet&Mind" }
      ];

      function defaultPost() {
        var today = new Date().toISOString().slice(0, 10);
        return {
          id: nextId(), status: "draft", isVideo: false, date: today,
          image: IMAGES ? "" : "",
          he: { title: "", lines: [], alt: "" },
          en: { title: "", lines: [], alt: "" }
        };
      }
      function nextId() {
        var max = 0;
        BO.getPosts().forEach(function (p) {
          var n = parseInt(String(p.id).replace(/[^0-9]/g, ""), 10);
          if (!isNaN(n) && n > max) max = n;
        });
        return "P-" + (max + 1);
      }

      function renderNotFound() {
        main.innerHTML = '<div class="bo-pagehead"><h1>Post not found</h1></div>' +
          '<div class="bo-card"><div class="bo-empty">No journal post with id "' + esc(id) + '".' +
          '<div style="margin-top:1rem"><a class="bo-btn bo-btn--ghost" href="journal.html">Back to Studio Journal</a></div>' +
          '</div></div>';
      }

      function linesToText(arr) { return (arr || []).join("\n"); }
      function textToLines(t) {
        return String(t || "").split("\n").map(function (s) { return s.trim(); }).filter(function (s) { return s.length; });
      }

      function render() {
        var head =
          '<div class="je-topline">' +
            '<a class="je-back" href="journal.html">&larr; Studio Journal</a>' +
            '<span class="sp"></span>' +
            '<span class="' + BO.pillClass(post.status) + '">' + esc(post.status) + '</span>' +
          '</div>' +
          '<div class="bo-pagehead"><h1>' + (isNew ? "New journal post" : "Edit post") + '</h1>' +
          '<p>One short daily note in both languages. Save a draft any time; publishing needs Hebrew and English filled in so the site never shows a half-empty card.</p></div>';

        var warn = '<div class="je-warn" id="je-warn" role="alert"></div>';

        var meta =
          '<div class="bo-card">' +
            '<div class="bo-form">' +
              '<div class="bo-field" style="max-width:220px">' +
                '<label for="je-date">Post date</label>' +
                '<input class="bo-input" type="date" id="je-date" value="' + esc(post.date) + '" />' +
              '</div>' +
              '<div class="bo-field">' +
                '<label for="je-vid" class="je-check"><input type="checkbox" id="je-vid" ' + (post.isVideo ? "checked" : "") + ' /> This post is a video</label>' +
                '<span class="bo-field__hint">Tags the card with a Video badge; the quarterly pro video + poster frame is set in the real build.</span>' +
              '</div>' +
              '<div class="bo-field">' +
                '<label>Cover image</label>' +
                '<span class="bo-field__hint" style="margin-bottom:0.5rem">Pick from images already on the site, or upload a new one.</span>' +
                '<div class="je-imggrid" id="je-imggrid">' +
                  IMAGES.map(function (im) {
                    return '<button type="button" class="je-imgopt" data-img="' + esc(im.src) + '" aria-pressed="' + (post.image === im.src) + '">' +
                      '<img src="' + esc(im.src) + '" alt="' + esc(im.label) + '" />' +
                      '<span class="je-imgcap">' + esc(im.label) + '</span></button>';
                  }).join("") +
                '</div>' +
                '<div style="margin-top:0.7rem"><button type="button" class="bo-btn bo-btn--ghost bo-btn--sm" id="je-upload">' +
                  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>' +
                  ' Upload image</button></div>' +
              '</div>' +
            '</div>' +
          '</div>';

        function langCard(code, label, dir, data) {
          var rtl = dir === "rtl";
          return '<div class="je-langcard">' +
            '<h3>' + esc(label) + ' <span class="je-langtag">' + esc(code) + '</span></h3>' +
            '<div class="bo-form">' +
              '<div class="bo-field">' +
                '<label for="je-title-' + code + '">Title</label>' +
                '<input class="bo-input" id="je-title-' + code + '" ' + (rtl ? 'dir="rtl"' : '') + ' value="' + esc(data.title) + '" placeholder="' + (rtl ? "כותרת הפוסט" : "Post title") + '" />' +
              '</div>' +
              '<div class="bo-field">' +
                '<label for="je-lines-' + code + '">Lines <span style="font-weight:400;color:var(--muted)">(one per line, up to 4)</span></label>' +
                '<textarea class="bo-textarea" id="je-lines-' + code + '" rows="4" ' + (rtl ? 'dir="rtl"' : '') + ' placeholder="' + (rtl ? "שורה אחת בכל שורה" : "One short line each") + '">' + esc(linesToText(data.lines)) + '</textarea>' +
              '</div>' +
              '<div class="bo-field">' +
                '<label for="je-alt-' + code + '">Image alt text</label>' +
                '<input class="bo-input" id="je-alt-' + code + '" ' + (rtl ? 'dir="rtl"' : '') + ' value="' + esc(data.alt || "") + '" placeholder="' + (rtl ? "תיאור התמונה" : "Describe the image") + '" />' +
                '<span class="bo-field__hint">Read by screen readers and shown if the image fails.</span>' +
              '</div>' +
            '</div>' +
          '</div>';
        }

        var cols = '<div class="je-cols">' +
          langCard("he", "Hebrew", "rtl", post.he) +
          langCard("en", "English", "ltr", post.en) + '</div>';

        var actions = '<div class="je-actions">' +
          '<button type="button" class="bo-btn bo-btn--ghost" id="je-savedraft">Save draft</button>' +
          '<button type="button" class="bo-btn" id="je-preview">Preview</button>' +
          '<button type="button" class="bo-btn bo-btn--brand" id="je-publish">Publish</button>' +
        '</div>';

        var modal =
          '<div class="je-modal" id="je-modal" role="dialog" aria-modal="true" aria-label="Post preview">' +
            '<div class="je-modal__card">' +
              '<div class="je-modal__head">' +
                '<h2>Preview</h2><span class="je-modal__tag">Not public</span>' +
                '<button type="button" class="bo-btn bo-btn--ghost bo-btn--sm je-modal__close" id="je-modal-close">Close</button>' +
              '</div>' +
              '<div class="je-modal__grid" id="je-modal-grid"></div>' +
            '</div>' +
          '</div>';

        main.innerHTML = head + warn +
          '<div class="je-grid">' + meta + cols + actions + '</div>' + modal;
        wire();
      }

      function collect() {
        post.date = document.getElementById("je-date").value || post.date;
        post.isVideo = document.getElementById("je-vid").checked;
        post.he = {
          title: document.getElementById("je-title-he").value.trim(),
          lines: textToLines(document.getElementById("je-lines-he").value),
          alt: document.getElementById("je-alt-he").value.trim()
        };
        post.en = {
          title: document.getElementById("je-title-en").value.trim(),
          lines: textToLines(document.getElementById("je-lines-en").value),
          alt: document.getElementById("je-alt-en").value.trim()
        };
      }

      // returns array of human-readable missing items, or [] if parity ok
      function parityGaps() {
        var gaps = [];
        if (!post.he.title) gaps.push("Hebrew title");
        if (!post.he.lines.length) gaps.push("Hebrew lines");
        if (!post.en.title) gaps.push("English title");
        if (!post.en.lines.length) gaps.push("English lines");
        return gaps;
      }

      function showWarn(msg) {
        var w = document.getElementById("je-warn");
        w.textContent = msg;
        w.classList.add("show");
        w.scrollIntoView({ behavior: "smooth", block: "center" });
      }
      function clearWarn() { document.getElementById("je-warn").classList.remove("show"); }

      function saveDraft() {
        collect();
        post.status = "draft";
        BO.savePost(post);
        isNew = false; id = post.id;
        clearWarn();
        BO.toast("Saved as <b>draft</b>");
        render();
      }

      function publish() {
        collect();
        var gaps = parityGaps();
        if (gaps.length) {
          showWarn("Cannot publish - fill in both languages first. Missing: " + gaps.join(", ") + ". You can still Save draft.");
          return;
        }
        if (!post.image) { showWarn("Cannot publish - choose a cover image first."); return; }
        post.status = "published";
        BO.savePost(post);
        BO.toast("Post <b>published</b>");
        setTimeout(function () { location.href = "journal.html"; }, 650);
      }

      function openPreview() {
        collect();
        var grid = document.getElementById("je-modal-grid");
        grid.innerHTML = feedCard("he", "עברית", "rtl", post.he) + feedCard("en", "English", "ltr", post.en);
        document.getElementById("je-modal").classList.add("show");
      }
      function feedCard(code, label, dir, data) {
        var img = post.image
          ? '<img class="je-feed__img" src="' + esc(post.image) + '" alt="' + esc(data.alt || "") + '" />'
          : '<div class="je-feed__img" style="display:grid;place-items:center;color:var(--muted);font-size:0.8rem">No image yet</div>';
        var lines = (data.lines || []).map(function (l) { return '<li>' + esc(l) + '</li>'; }).join("") ||
          '<li style="opacity:0.6">(no lines)</li>';
        var vid = post.isVideo ? '<span class="je-feed__vid">Video</span>' : '';
        return '<div dir="' + dir + '">' +
          '<div style="font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.4rem">' + esc(label) + '</div>' +
          '<article class="je-feed">' + img +
            '<div class="je-feed__body">' +
              '<div class="je-feed__eyebrow"><span dir="ltr">' + esc(BO.fmtDate(post.date)) + '</span></div>' +
              '<h3 class="je-feed__title">' + esc(data.title || "(no title)") + vid + '</h3>' +
              '<ul class="je-feed__lines">' + lines + '</ul>' +
            '</div>' +
          '</article></div>';
      }

      function wire() {
        Array.prototype.forEach.call(main.querySelectorAll("[data-img]"), function (b) {
          b.addEventListener("click", function () {
            post.image = b.getAttribute("data-img");
            Array.prototype.forEach.call(main.querySelectorAll("[data-img]"), function (x) {
              x.setAttribute("aria-pressed", x === b ? "true" : "false");
            });
          });
        });
        document.getElementById("je-upload").addEventListener("click", function () {
          BO.toast("Upload is mocked - pick from the grid for this demo");
        });
        document.getElementById("je-savedraft").addEventListener("click", saveDraft);
        document.getElementById("je-preview").addEventListener("click", openPreview);
        document.getElementById("je-publish").addEventListener("click", publish);
        document.getElementById("je-modal-close").addEventListener("click", function () {
          document.getElementById("je-modal").classList.remove("show");
        });
        document.getElementById("je-modal").addEventListener("click", function (e) {
          if (e.target === this) this.classList.remove("show");
        });
      }

      render();
    })();
  </script>
</body>
</html>
