<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Featured - Picpong Backoffice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..700;1,300..600&family=Hanken+Grotesk:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="css/backoffice.css" />
  <style>
    /* featured curation - two lists */
    .ft-note {
      margin-bottom: 1.4rem; padding: 0.8rem 1rem; border-radius: var(--bo-radius-sm);
      background: var(--bo-orange-tint); border: 1px dashed var(--bo-orange);
      font-size: 0.85rem; color: #6b3a13;
    }
    .ft-note b { color: var(--bo-orange); }
    .ft-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; align-items: start; }
    @media (max-width: 820px) { .ft-cols { grid-template-columns: 1fr; } }
    .ft-row { display: flex; gap: 0.75rem; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid var(--bo-line-soft); }
    .ft-row:last-child { border-bottom: none; }
    .ft-thumb { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; flex: none; background: var(--kraft); }
    .ft-meta { min-width: 0; flex: 1; }
    .ft-title { font-weight: 600; font-size: 0.94rem; }
    .ft-title-he { font-size: 0.85rem; color: var(--muted); }
    .ft-sub { font-size: 0.78rem; color: var(--muted); }
    .ft-num { width: 24px; height: 24px; border-radius: 999px; background: var(--bo-orange); color: #fff; font-size: 0.76rem; font-weight: 700; display: grid; place-items: center; flex: none; }
    .ft-rowactions { display: flex; gap: 0.35rem; align-items: center; }
    .ft-iconbtn { width: 30px; height: 30px; border-radius: 7px; display: grid; place-items: center; border: 1.5px solid var(--bo-line); background: var(--bo-surface); color: var(--ink); cursor: pointer; }
    .ft-iconbtn:hover:not(:disabled) { border-color: var(--ink); }
    .ft-iconbtn:disabled { opacity: 0.35; cursor: not-allowed; }
    .ft-iconbtn svg { width: 15px; height: 15px; }
    .ft-move { display: flex; flex-direction: column; gap: 2px; }
  </style>
</head>
<body>
  <script src="js/bo.js"></script>
  <script>
    (function () {
      var session = BO.requireRole(["Admin", "Content"]);
      if (!session) return;
      var main = BO.mountShell({ active: "featured.html", title: "Featured" });
      var esc = BO.esc;

      // seeded from the real marketing-site projects (projects.html tiles / app.js PROJECTS)
      var WORKS = [
        { slug: "king-solomon",    en: "Colourful booths, struck and re-staged", he: "ביתנים צבעוניים, מפורקים ומורכבים מחדש", client: "King Solomon", cat: "Convention", image: "../assets/projects/king-solomon.jpg" },
        { slug: "microsoft",       en: "New-office launch environment",          he: "סביבת השקה למשרד חדש",               client: "Microsoft",    cat: "Event",      image: "../assets/projects/microsoft.jpg" },
        { slug: "landa",           en: "Illuminated letters & graphics",         he: "אותיות מוארות וגרפיקה",              client: "Landa",        cat: "Convention", image: "../assets/projects/landa.jpg" },
        { slug: "google-cloud",    en: "Spring-party welcome build",             he: "מבנה קבלת פנים למסיבת אביב",         client: "Google Cloud", cat: "Event",      image: "../assets/projects/google-cloud.jpg" },
        { slug: "synamedia",       en: "Conference booth & lounge",              he: "ביתן כנס וטרקלין",                   client: "Synamedia",    cat: "Booth",      image: "../assets/projects/synamedia.jpg" },
        { slug: "deep-instinct",   en: "Office inauguration",                    he: "חנוכת משרד",                        client: "Deep Instinct",cat: "Event",      image: "../assets/projects/deep-instinct.jpg" },
        { slug: "bluevine",        en: "Branding event environment",             he: "סביבת אירוע מיתוג",                  client: "BlueVine",     cat: "Event",      image: "../assets/projects/bluevine.jpg" },
        { slug: "redefine-meat",   en: "Rebranding showcase",                    he: "תצוגת מיתוג מחדש",                   client: "Redefine Meat",cat: "Booth",      image: "../assets/projects/redefine-meat.jpg" },
        { slug: "priority-maccabi",en: "VIP room build-out",                     he: "בניית חדר VIP",                     client: "Priority",     cat: "Event",      image: "../assets/projects/priority-maccabi.jpg" },
        { slug: "meetmind",        en: "Convention presence",                    he: "נוכחות בכנס",                       client: "Meet&Mind",    cat: "Convention", image: "../assets/projects/meetmind.jpg" }
      ];
      function work(slug) { return WORKS.filter(function (w) { return w.slug === slug; })[0]; }

      // in-memory state (Phase-2 wires this to the real home page)
      var featured = ["king-solomon", "microsoft", "google-cloud", "landa"];

      var upSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>';
      var downSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
      var xSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
      var plusSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>';

      function render() {
        var head =
          '<div class="bo-pagehead"><h1>Featured works</h1>' +
          '<p>Choose which projects lead the home page and the order they appear in. Drag order is done with the up and down controls.</p></div>';

        var note = '<div class="ft-note"><b>Demo.</b> Order and selection are held in this screen only. Wiring the chosen works into the live home page is Phase-2 build work.</div>';

        // featured (ordered)
        var featRows = featured.length ? featured.map(function (slug, i) {
          var w = work(slug);
          return '<div class="ft-row">' +
            '<span class="ft-num">' + (i + 1) + '</span>' +
            '<img class="ft-thumb" src="' + esc(w.image) + '" alt="" />' +
            '<span class="ft-meta">' +
              '<span class="ft-title">' + esc(w.en) + '</span><br>' +
              '<span class="ft-title-he" dir="rtl">' + esc(w.he) + '</span><br>' +
              '<span class="ft-sub">' + esc(w.client) + ' &middot; ' + esc(w.cat) + '</span>' +
            '</span>' +
            '<span class="ft-rowactions">' +
              '<span class="ft-move">' +
                '<button class="ft-iconbtn" type="button" data-up="' + esc(slug) + '" aria-label="Move up" ' + (i === 0 ? "disabled" : "") + '>' + upSvg + '</button>' +
                '<button class="ft-iconbtn" type="button" data-down="' + esc(slug) + '" aria-label="Move down" ' + (i === featured.length - 1 ? "disabled" : "") + '>' + downSvg + '</button>' +
              '</span>' +
              '<button class="ft-iconbtn" type="button" data-remove="' + esc(slug) + '" aria-label="Remove from featured">' + xSvg + '</button>' +
            '</span>' +
          '</div>';
        }).join("") : '<div class="bo-empty">Nothing featured yet - add works from the right.</div>';

        // available (not featured)
        var available = WORKS.filter(function (w) { return featured.indexOf(w.slug) === -1; });
        var availRows = available.length ? available.map(function (w) {
          return '<div class="ft-row">' +
            '<img class="ft-thumb" src="' + esc(w.image) + '" alt="" />' +
            '<span class="ft-meta">' +
              '<span class="ft-title">' + esc(w.en) + '</span><br>' +
              '<span class="ft-title-he" dir="rtl">' + esc(w.he) + '</span><br>' +
              '<span class="ft-sub">' + esc(w.client) + ' &middot; ' + esc(w.cat) + '</span>' +
            '</span>' +
            '<button class="bo-btn bo-btn--ghost bo-btn--sm" type="button" data-add="' + esc(w.slug) + '">' + plusSvg + ' Add</button>' +
          '</div>';
        }).join("") : '<div class="bo-empty">Every work is featured.</div>';

        var cols = '<div class="ft-cols">' +
          '<section class="bo-card"><div class="bo-card__head"><h2>Featured on home</h2><span style="margin-inline-start:auto;color:var(--muted);font-size:0.85rem;font-weight:600">' + featured.length + '</span></div>' + featRows + '</section>' +
          '<section class="bo-card"><div class="bo-card__head"><h2>Available works</h2><span style="margin-inline-start:auto;color:var(--muted);font-size:0.85rem;font-weight:600">' + available.length + '</span></div>' + availRows + '</section>' +
        '</div>';

        main.innerHTML = head + note + cols;
        wire();
      }

      function wire() {
        Array.prototype.forEach.call(main.querySelectorAll("[data-up]"), function (b) {
          b.addEventListener("click", function () { moveItem(b.getAttribute("data-up"), -1); });
        });
        Array.prototype.forEach.call(main.querySelectorAll("[data-down]"), function (b) {
          b.addEventListener("click", function () { moveItem(b.getAttribute("data-down"), 1); });
        });
        Array.prototype.forEach.call(main.querySelectorAll("[data-remove]"), function (b) {
          b.addEventListener("click", function () {
            var slug = b.getAttribute("data-remove");
            featured = featured.filter(function (s) { return s !== slug; });
            BO.toast("Removed <b>" + esc(work(slug).client) + "</b> from featured");
            render();
          });
        });
        Array.prototype.forEach.call(main.querySelectorAll("[data-add]"), function (b) {
          b.addEventListener("click", function () {
            var slug = b.getAttribute("data-add");
            featured.push(slug);
            BO.toast("Added <b>" + esc(work(slug).client) + "</b> to featured");
            render();
          });
        });
      }

      function moveItem(slug, delta) {
        var i = featured.indexOf(slug);
        var j = i + delta;
        if (i < 0 || j < 0 || j >= featured.length) return;
        var tmp = featured[i]; featured[i] = featured[j]; featured[j] = tmp;
        render();
      }

      render();
    })();
  </script>
</body>
</html>
