<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Media library - Picpong Backoffice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..700;1,300..600&family=Hanken+Grotesk:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="css/backoffice.css" />
  <style>
    /* media library */
    .md-bar { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
    .md-bar .sp { margin-inline-start: auto; }
    .md-search { max-width: 260px; }
    .md-search .bo-input { padding: 0.5rem 0.7rem; }
    .md-chips { display: flex; gap: 0.5rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .md-chip { font: inherit; font-weight: 600; font-size: 0.85rem; cursor: pointer; padding: 0.4rem 0.85rem; border-radius: 999px; border: 1.5px solid var(--bo-line); background: var(--bo-surface); color: var(--ink); }
    .md-chip:hover { border-color: var(--ink); }
    .md-chip[aria-pressed="true"] { background: var(--bo-orange-tint); border-color: var(--bo-orange); color: var(--bo-orange); }
    .md-note { margin-bottom: 1.2rem; padding: 0.7rem 0.95rem; border-radius: var(--bo-radius-sm); background: var(--bo-orange-tint); border: 1px dashed var(--bo-orange); font-size: 0.83rem; color: #6b3a13; }
    .md-note b { color: var(--bo-orange); }
    .md-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
    .md-card { background: var(--bo-surface); border: 1px solid var(--bo-line); border-radius: var(--bo-radius); overflow: hidden; box-shadow: var(--bo-shadow); }
    .md-thumb { position: relative; aspect-ratio: 4 / 3; background: var(--bo-bg); display: grid; place-items: center; overflow: hidden; }
    .md-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .md-thumb--logo { padding: 1.1rem; }
    .md-thumb--logo img { width: 100%; height: 100%; object-fit: contain; }
    .md-kind { position: absolute; top: 6px; inset-inline-start: 6px; font-size: 0.64rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 0.12rem 0.4rem; border-radius: 5px; background: rgba(26,26,26,0.72); color: #fff; }
    .md-kind--video { background: var(--bo-cta); color: var(--ink); }
    .md-playbadge { position: absolute; inset: 0; display: grid; place-items: center; pointer-events: none; }
    .md-playbadge svg { width: 42px; height: 42px; color: #fff; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5)); }
    .md-body { padding: 0.7rem 0.8rem 0.85rem; }
    .md-name { font-weight: 600; font-size: 0.85rem; word-break: break-all; }
    .md-used { font-size: 0.74rem; color: var(--muted); margin-top: 0.2rem; }
    .md-poster { display: flex; gap: 0.5rem; margin-top: 0.6rem; }
    .md-empty { grid-column: 1 / -1; }
  </style>
</head>
<body>
  <script src="js/bo.js"></script>
  <script>
    (function () {
      var session = BO.requireRole(["Admin", "Content"]);
      if (!session) return;
      var main = BO.mountShell({ active: "media.html", title: "Media library" });
      var esc = BO.esc;

      var A = "../assets/";
      // real assets that exist under mockup-v6/assets/
      var MEDIA = [
        // the one video post (P-206), shown with its poster still
        { file: "king-solomon-walkthrough.mp4", name: "King Solomon walkthrough", kind: "video", thumb: A + "projects/king-solomon.jpg", used: "Journal (video post P-206)", poster: true },
        // project photography (kind: image)
        { file: "microsoft.jpg",        name: "microsoft.jpg",        kind: "image", thumb: A + "projects/microsoft.jpg",        used: "Projects, Journal" },
        { file: "google-cloud.jpg",     name: "google-cloud.jpg",     kind: "image", thumb: A + "projects/google-cloud.jpg",     used: "Projects, Journal" },
        { file: "landa.jpg",            name: "landa.jpg",            kind: "image", thumb: A + "projects/landa.jpg",            used: "Projects, Journal" },
        { file: "king-solomon.jpg",     name: "king-solomon.jpg",     kind: "image", thumb: A + "projects/king-solomon.jpg",     used: "Projects hero" },
        { file: "synamedia.jpg",        name: "synamedia.jpg",        kind: "image", thumb: A + "projects/synamedia.jpg",        used: "Projects, Journal" },
        { file: "deep-instinct.jpg",    name: "deep-instinct.jpg",    kind: "image", thumb: A + "projects/deep-instinct.jpg",    used: "Projects, Journal" },
        { file: "bluevine.jpg",         name: "bluevine.jpg",         kind: "image", thumb: A + "projects/bluevine.jpg",         used: "Projects, Journal" },
        { file: "redefine-meat.jpg",    name: "redefine-meat.jpg",    kind: "image", thumb: A + "projects/redefine-meat.jpg",    used: "Projects, Journal" },
        { file: "priority-maccabi.jpg", name: "priority-maccabi.jpg", kind: "image", thumb: A + "projects/priority-maccabi.jpg", used: "Projects" },
        { file: "meetmind.jpg",         name: "meetmind.jpg",         kind: "image", thumb: A + "projects/meetmind.jpg",         used: "Projects" },
        // brand marks + client logos (kind: logo)
        { file: "puffer.svg",     name: "puffer.svg",     kind: "logo", thumb: A + "brand/puffer.svg",         used: "Site mascot, backoffice" },
        { file: "pp-logo.png",    name: "pp-logo.png",    kind: "logo", thumb: A + "brand/pp-logo.png",        used: "Header, footer" },
        { file: "microsoft.svg",  name: "microsoft.svg",  kind: "logo", thumb: A + "brand/logos/microsoft.svg",  used: "Client strip" },
        { file: "google-cloud.svg",name: "google-cloud.svg",kind: "logo",thumb: A + "brand/logos/google-cloud.svg", used: "Client strip" },
        { file: "intel.svg",      name: "intel.svg",      kind: "logo", thumb: A + "brand/logos/intel.svg",      used: "Client strip" },
        { file: "ibm.svg",        name: "ibm.svg",        kind: "logo", thumb: A + "brand/logos/ibm.svg",        used: "Client strip" },
        { file: "amdocs.svg",     name: "amdocs.svg",     kind: "logo", thumb: A + "brand/logos/amdocs.svg",     used: "Client strip" },
        { file: "landa.svg",      name: "landa.svg",      kind: "logo", thumb: A + "brand/logos/landa.svg",      used: "Client strip" },
        { file: "maccabi.svg",    name: "maccabi.svg",    kind: "logo", thumb: A + "brand/logos/maccabi.svg",    used: "Client strip" },
        { file: "wix.svg",        name: "wix.svg",        kind: "logo", thumb: A + "brand/logos/wix.svg",        used: "Client strip" }
      ];

      var KINDS = ["all", "image", "video", "logo"];
      var kindLabel = { all: "All", image: "Images", video: "Video", logo: "Logos" };
      var filter = "all";
      var query = "";

      var playSvg = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';

      function render() {
        var head = '<div class="bo-pagehead"><h1>Media library</h1>' +
          '<p>Every image, logo and video the site draws on. Filter by kind or search by filename; uploads land here in the build.</p></div>';

        var bar = '<div class="md-bar">' +
          '<span style="color:var(--muted);font-weight:600;font-size:0.9rem">' + MEDIA.length + ' assets</span>' +
          '<span class="sp"></span>' +
          '<div class="md-search"><label for="md-q" class="bo-skip" style="position:static">Search media</label>' +
            '<input class="bo-input" type="search" id="md-q" placeholder="Search by name" value="' + esc(query) + '" aria-label="Search media by name" /></div>' +
          '<button class="bo-btn bo-btn--brand" type="button" id="md-upload">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Upload</button>' +
        '</div>';

        var chips = '<div class="md-chips" role="group" aria-label="Filter by kind">' +
          KINDS.map(function (k) {
            var n = k === "all" ? MEDIA.length : MEDIA.filter(function (m) { return m.kind === k; }).length;
            return '<button class="md-chip" type="button" data-kind="' + k + '" aria-pressed="' + (filter === k) + '">' +
              esc(kindLabel[k]) + ' <span style="opacity:0.7;font-weight:700">' + n + '</span></button>';
          }).join("") + '</div>';

        var note = '<div class="md-note"><b>Video.</b> The quarterly professional video and its poster frame are produced under a separate contract in the real build. Below, set which still stands in as the poster.</div>';

        var q = query.toLowerCase();
        var list = MEDIA.filter(function (m) {
          return (filter === "all" || m.kind === filter) && (!q || m.name.toLowerCase().indexOf(q) !== -1);
        });

        var cards;
        if (!list.length) {
          cards = '<div class="bo-empty md-empty">No media matches.</div>';
        } else {
          cards = list.map(function (m) {
            var isLogo = m.kind === "logo";
            var thumb = '<div class="md-thumb ' + (isLogo ? "md-thumb--logo" : "") + '">' +
              '<span class="md-kind md-kind--' + esc(m.kind) + '">' + esc(m.kind) + '</span>' +
              '<img src="' + esc(m.thumb) + '" alt="' + esc(m.name) + '" onerror="this.style.display=\'none\'" />' +
              (m.kind === "video" ? '<span class="md-playbadge">' + playSvg + '</span>' : '') +
            '</div>';
            var poster = m.poster
              ? '<div class="md-poster"><button class="bo-btn bo-btn--ghost bo-btn--sm" type="button" data-poster="' + esc(m.file) + '">Set poster frame</button></div>'
              : '';
            return '<div class="md-card">' + thumb +
              '<div class="md-body"><div class="md-name">' + esc(m.name) + '</div>' +
                '<div class="md-used">Used in: ' + esc(m.used) + '</div>' + poster +
              '</div></div>';
          }).join("");
        }

        main.innerHTML = head + bar + chips + note + '<div class="md-grid">' + cards + '</div>';
        wire();
      }

      function wire() {
        Array.prototype.forEach.call(main.querySelectorAll("[data-kind]"), function (b) {
          b.addEventListener("click", function () { filter = b.getAttribute("data-kind"); render(); });
        });
        var q = document.getElementById("md-q");
        if (q) q.addEventListener("input", function () {
          query = q.value;
          // re-render but keep focus + caret at end
          render();
          var nq = document.getElementById("md-q");
          if (nq) { nq.focus(); nq.setSelectionRange(nq.value.length, nq.value.length); }
        });
        var up = document.getElementById("md-upload");
        if (up) up.addEventListener("click", function () { BO.toast("Upload is mocked for this demo"); });
        Array.prototype.forEach.call(main.querySelectorAll("[data-poster]"), function (b) {
          b.addEventListener("click", function () { BO.toast("Poster frame set - real frame picker comes in the build"); });
        });
      }

      render();
    })();
  </script>
</body>
</html>
