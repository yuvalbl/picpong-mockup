<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Project editor - Picpong Backoffice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..700;1,300..600&family=Hanken+Grotesk:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="css/backoffice.css" />
  <style>
    /* project editor */
    .pe-topline { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
    .pe-back { color: var(--bo-orange); font-weight: 600; text-decoration: none; font-size: 0.9rem; }
    .pe-back:hover { text-decoration: underline; }
    .pe-grid { display: grid; grid-template-columns: 1fr; gap: 1.2rem; }
    .pe-mainimg { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
    .pe-mainimg img { width: 160px; height: 110px; object-fit: cover; border-radius: 9px; flex: none; background: var(--kraft); border: 1.5px solid var(--bo-line); }
    /* supporting media rows */
    .pe-media { display: flex; flex-direction: column; }
    .pe-mediarow { display: flex; gap: 0.8rem; align-items: flex-start; padding: 0.8rem 0; border-bottom: 1px solid var(--bo-line-soft); }
    .pe-mediarow:last-child { border-bottom: none; }
    .pe-mediarow img { width: 72px; height: 56px; object-fit: cover; border-radius: 7px; flex: none; background: var(--kraft); }
    .pe-media-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 0.35rem; }
    .pe-media-id { font-size: 0.76rem; color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .pe-media-note { font-size: 0.76rem; color: var(--muted); }
    .pe-mediarow .bo-input { padding: 0.5rem 0.65rem; }
    .pe-imgpick { display: grid; grid-template-columns: repeat(auto-fill, minmax(84px, 1fr)); gap: 0.5rem; }
    .pe-imgopt { border: 2px solid var(--bo-line); border-radius: 8px; overflow: hidden; cursor: pointer; padding: 0; background: none; aspect-ratio: 4/3; }
    .pe-imgopt img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pe-imgopt:hover { border-color: var(--ink); }
    .pe-imgopt[aria-pressed="true"] { border-color: var(--bo-orange); box-shadow: 0 0 0 3px rgba(177,78,15,0.18); }
  </style>
</head>
<body>
  <script src="js/bo.js"></script>
  <script>
    (function () {
      var session = BO.requireRole(["Admin", "Content"]);
      if (!session) return;
      var main = BO.mountShell({ active: "projects.html", title: "Project editor" });
      var esc = BO.esc;

      // seeded from the real site (app.js PROJECTS + projects.html)
      var DATA = {
        "king-solomon":    { en: "Colourful booths, struck and re-staged", he: "ביתנים צבעוניים, מפורקים ומורכבים מחדש", client: "King Solomon",  cat: "Convention", imgs: ["king-solomon.jpg","microsoft.jpg","google-cloud.jpg","landa.jpg","synamedia.jpg","deep-instinct.jpg","bluevine.jpg","redefine-meat.jpg","priority-maccabi.jpg","meetmind.jpg"] },
        "microsoft":       { en: "New-office launch environment",          he: "סביבת השקה למשרד חדש",               client: "Microsoft",     cat: "Event",      imgs: ["microsoft.jpg","deep-instinct.jpg","bluevine.jpg"] },
        "google-cloud":    { en: "Spring-party welcome build",             he: "מבנה קבלת פנים למסיבת אביב",         client: "Google Cloud",  cat: "Event",      imgs: ["google-cloud.jpg","bluevine.jpg","microsoft.jpg"] },
        "landa":           { en: "Illuminated letters & graphics",         he: "אותיות מוארות וגרפיקה",              client: "Landa",         cat: "Convention", imgs: ["landa.jpg","synamedia.jpg"] },
        "synamedia":       { en: "Conference booth & lounge",              he: "ביתן כנס וטרקלין",                   client: "Synamedia",     cat: "Booth",      imgs: ["synamedia.jpg","meetmind.jpg"] },
        "deep-instinct":   { en: "Office inauguration",                    he: "חנוכת משרד",                        client: "Deep Instinct", cat: "Event",      imgs: ["deep-instinct.jpg","microsoft.jpg"] },
        "redefine-meat":   { en: "Rebranding showcase",                    he: "תצוגת מיתוג מחדש",                   client: "Redefine Meat", cat: "Booth",      imgs: ["redefine-meat.jpg","synamedia.jpg"] },
        "bluevine":        { en: "Branding event environment",             he: "סביבת אירוע מיתוג",                  client: "BlueVine",      cat: "Event",      imgs: ["bluevine.jpg","google-cloud.jpg"] },
        "priority-maccabi":{ en: "VIP room build-out",                     he: "בניית חדר VIP",                     client: "Priority",      cat: "Event",      imgs: ["priority-maccabi.jpg","bluevine.jpg"] },
        "meetmind":        { en: "Convention presence",                    he: "נוכחות בכנס",                       client: "Meet&Mind",     cat: "Convention", imgs: ["meetmind.jpg","landa.jpg"] }
      };
      var ALL_ASSETS = ["king-solomon.jpg","microsoft.jpg","google-cloud.jpg","landa.jpg","synamedia.jpg","deep-instinct.jpg","bluevine.jpg","redefine-meat.jpg","priority-maccabi.jpg","meetmind.jpg"];
      var CATS = ["Convention", "Event", "Booth"];
      var IMG = "../assets/projects/";

      var params = new URLSearchParams(location.search);
      var slug = params.get("slug");
      var isNew = !slug;
      var proj;

      if (isNew) {
        proj = { slug: "", en: "", he: "", client: "", cat: "Convention", imgs: [] };
      } else if (DATA[slug]) {
        var d = DATA[slug];
        proj = { slug: slug, en: d.en, he: d.he, client: d.client, cat: d.cat, imgs: d.imgs.slice() };
      } else {
        main.innerHTML = '<div class="bo-pagehead"><h1>Project not found</h1></div>' +
          '<div class="bo-card"><div class="bo-empty">No project with slug "' + esc(slug) + '".' +
          '<div style="margin-top:1rem"><a class="bo-btn bo-btn--ghost" href="projects.html">Back to Projects</a></div></div></div>';
        return;
      }

      function mediaId(i) { return "proj-" + (proj.slug || "new") + "-" + (i === 0 ? "hero" : i); }

      function render() {
        var head = '<div class="pe-topline"><a class="pe-back" href="projects.html">&larr; Projects</a></div>' +
          '<div class="bo-pagehead"><h1>' + (isNew ? "New project" : "Edit project") + '</h1>' +
          '<p>Case-study details and its gallery. The main image leads the card; each supporting image can be shared and quoted on its own.</p></div>';

        var details = '<div class="bo-card"><div class="bo-card__head"><h2>Details</h2></div>' +
          '<div class="bo-form">' +
            '<div class="bo-field--row">' +
              '<div class="bo-field"><label for="pe-en">Title (English)</label>' +
                '<input class="bo-input" id="pe-en" value="' + esc(proj.en) + '" placeholder="Project title" /></div>' +
              '<div class="bo-field"><label for="pe-he">Title (Hebrew)</label>' +
                '<input class="bo-input" id="pe-he" dir="rtl" value="' + esc(proj.he) + '" placeholder="כותרת הפרויקט" /></div>' +
            '</div>' +
            '<div class="bo-field--row">' +
              '<div class="bo-field"><label for="pe-client">Client</label>' +
                '<input class="bo-input" id="pe-client" value="' + esc(proj.client) + '" placeholder="Client name" /></div>' +
              '<div class="bo-field"><label for="pe-cat">Category</label>' +
                '<select class="bo-select" id="pe-cat">' +
                  CATS.map(function (c) { return '<option value="' + esc(c) + '"' + (proj.cat === c ? " selected" : "") + '>' + esc(c) + '</option>'; }).join("") +
                '</select></div>' +
            '</div>' +
            '<div class="bo-field"><label for="pe-slug">URL slug</label>' +
              '<input class="bo-input" id="pe-slug" value="' + esc(proj.slug) + '" placeholder="e.g. king-solomon" />' +
              '<span class="bo-field__hint">Lowercase, hyphens between words. Keep it stable once published - it is the project\'s permanent link.</span></div>' +
          '</div></div>';

        var mainImg = '<div class="bo-card"><div class="bo-card__head"><h2>Main image</h2></div>' +
          '<div class="pe-mainimg">' +
            '<img id="pe-mainimg-prev" src="' + esc(IMG + (proj.imgs[0] || "microsoft.jpg")) + '" alt="Current main image" />' +
            '<div style="flex:1;min-width:220px"><span class="bo-field__hint" style="display:block;margin-bottom:0.5rem">Pick the lead image from the site library.</span>' +
              '<div class="pe-imgpick" id="pe-mainpick">' +
                ALL_ASSETS.map(function (a) {
                  return '<button type="button" class="pe-imgopt" data-mainimg="' + esc(a) + '" aria-pressed="' + (proj.imgs[0] === a) + '">' +
                    '<img src="' + esc(IMG + a) + '" alt="' + esc(a.replace(".jpg", "")) + '" /></button>';
                }).join("") +
              '</div></div>' +
          '</div></div>';

        var mediaRows = proj.imgs.length ? proj.imgs.map(function (a, i) {
          var id = mediaId(i);
          return '<div class="pe-mediarow">' +
            '<img src="' + esc(IMG + a) + '" alt="" />' +
            '<div class="pe-media-body">' +
              '<span class="pe-media-id">' + esc(id) + (i === 0 ? "  (hero)" : "") + '</span>' +
              '<label for="pe-alt-' + i + '" style="font-size:0.8rem;font-weight:600">Alt text</label>' +
              '<input class="bo-input" id="pe-alt-' + i + '" value="" placeholder="Describe this image" />' +
              '<span class="pe-media-note">Independently shareable and quotable on the site.</span>' +
            '</div>' +
            '<button class="bo-btn bo-btn--ghost bo-btn--sm" type="button" data-delmedia="' + i + '">Remove</button>' +
          '</div>';
        }).join("") : '<div class="bo-empty">No images yet - add one below.</div>';

        var media = '<div class="bo-card"><div class="bo-card__head"><h2>Gallery media</h2>' +
          '<span style="margin-inline-start:auto;color:var(--muted);font-size:0.85rem;font-weight:600">' + proj.imgs.length + ' image' + (proj.imgs.length === 1 ? "" : "s") + '</span></div>' +
          '<div class="pe-media">' + mediaRows + '</div>' +
          '<div style="margin-top:0.9rem"><button class="bo-btn bo-btn--ghost bo-btn--sm" type="button" id="pe-addmedia">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Add media</button></div>' +
          '</div>';

        var actions = '<div style="display:flex;gap:0.7rem;flex-wrap:wrap">' +
          '<a class="bo-btn bo-btn--ghost" href="projects.html">Cancel</a>' +
          '<button class="bo-btn bo-btn--brand" type="button" id="pe-save">Save project</button></div>';

        main.innerHTML = head + '<div class="pe-grid">' + details + mainImg + media + actions + '</div>';
        wire();
      }

      function wire() {
        Array.prototype.forEach.call(main.querySelectorAll("[data-mainimg]"), function (b) {
          b.addEventListener("click", function () {
            var a = b.getAttribute("data-mainimg");
            // move chosen asset to front of imgs (becomes hero)
            proj.imgs = [a].concat(proj.imgs.filter(function (x) { return x !== a; }));
            render();
          });
        });
        Array.prototype.forEach.call(main.querySelectorAll("[data-delmedia]"), function (b) {
          b.addEventListener("click", function () {
            proj.imgs.splice(parseInt(b.getAttribute("data-delmedia"), 10), 1);
            render();
          });
        });
        var add = document.getElementById("pe-addmedia");
        if (add) add.addEventListener("click", function () {
          var next = ALL_ASSETS.filter(function (a) { return proj.imgs.indexOf(a) === -1; })[0] || ALL_ASSETS[0];
          proj.imgs.push(next);
          BO.toast("Media added - real upload comes in the build");
          render();
        });
        document.getElementById("pe-save").addEventListener("click", function () {
          proj.en = document.getElementById("pe-en").value.trim();
          proj.he = document.getElementById("pe-he").value.trim();
          proj.client = document.getElementById("pe-client").value.trim();
          proj.cat = document.getElementById("pe-cat").value;
          proj.slug = document.getElementById("pe-slug").value.trim();
          BO.toast("Project <b>" + esc(proj.client || proj.en || "untitled") + "</b> saved");
          setTimeout(function () { location.href = "projects.html"; }, 650);
        });
      }

      render();
    })();
  </script>
</body>
</html>
