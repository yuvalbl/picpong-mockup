<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Dashboard - Picpong Backoffice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..700;1,300..600&family=Hanken+Grotesk:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="css/backoffice.css" />
</head>
<body>
  <script src="js/bo.js"></script>
  <script>
    (function () {
      var session = BO.requireRole(["Admin", "Operator"]);
      if (!session) return;
      var main = BO.mountShell({ active: "dashboard.html", title: "Dashboard" });
      var role = session.role;
      var esc = BO.esc;

      var leads = BO.getLeads();

      // ---- shared metrics ----
      var newLeads = leads.filter(function (l) { return l.status === "new"; });
      var newToday = leads.filter(function (l) { return l.status === "new" && BO.isToday(l.createdAt); });
      var unassigned = leads.filter(function (l) { return !l.assigned && l.status !== "won" && l.status !== "lost"; });
      var awaitingReply = leads.filter(function (l) { return l.status === "new" || l.status === "contacted"; });

      function tile(label, num, foot, accent) {
        return '<div class="bo-stat' + (accent ? ' bo-stat--accent' : '') + '">' +
          '<span class="bo-stat__label">' + esc(label) + '</span>' +
          '<span class="bo-stat__num">' + num + '</span>' +
          (foot ? '<span class="bo-stat__foot">' + esc(foot) + '</span>' : '') +
          '</div>';
      }

      function leadRow(l) {
        var thumbs = (l.items || []).slice(0, 3).map(function (it) {
          return '<img src="' + esc(it.thumb) + '" alt="" title="' + esc(it.title) + '" />';
        }).join("");
        var more = (l.items || []).length > 3 ? '<span class="bo-thumbs__more">+' + ((l.items.length) - 3) + '</span>' : '';
        return '<a class="bo-list__row" href="lead-detail.html?id=' + encodeURIComponent(l.id) + '">' +
          '<span class="bo-thumbs">' + thumbs + more + '</span>' +
          '<span><span class="bo-list__name">' + esc(l.name) + '</span><br>' +
          '<span class="bo-list__meta">' + esc(l.company) + ' · ' + BO.timeAgo(l.createdAt) + '</span></span>' +
          '<span class="bo-list__spacer"></span>' +
          '<span class="' + BO.pillClass(l.status) + '">' + esc(l.status) + '</span></a>';
      }

      // ---- SALES panel ----
      function salesBlock() {
        var tiles =
          tile("New today", newToday.length, "leads landed today", true) +
          tile("Unassigned", unassigned.length, "no rep yet") +
          tile("Awaiting reply", awaitingReply.length, "new + contacted");
        var list = newLeads.length
          ? newLeads.slice(0, 6).map(leadRow).join("")
          : '<div class="bo-empty">No new leads right now.</div>';
        return '<section class="bo-grid bo-grid--3" style="margin-bottom:1.4rem">' + tiles + '</section>' +
          '<section class="bo-card">' +
            '<div class="bo-card__head"><h2>Newest leads</h2><a class="bo-card__more" href="leads.html">All leads</a></div>' +
            '<div class="bo-list">' + list + '</div>' +
          '</section>';
      }

      // ---- ADMIN links strip ----
      function adminLinks() {
        return '<section class="bo-card">' +
          '<div class="bo-card__head"><h2>Admin</h2></div>' +
          '<div class="bo-grid bo-grid--2">' +
            '<a class="bo-list__row" href="users.html"><span class="bo-avatar" style="background:var(--bo-orange-tint);color:var(--bo-orange)">' + BO.ICON.users + '</span><span><span class="bo-list__name">Users</span><br><span class="bo-list__meta">' + BO.getUsers().length + ' staff accounts</span></span></a>' +
            '<a class="bo-list__row" href="settings.html"><span class="bo-avatar" style="background:var(--bo-orange-tint);color:var(--bo-orange)">' + BO.ICON.settings + '</span><span><span class="bo-list__name">Settings</span><br><span class="bo-list__meta">WhatsApp, routing, social</span></span></a>' +
          '</div></section>';
      }

      var greeting = '<div class="bo-pagehead"><h1>' + greetLine(session.name) + '</h1><p>' + subLine(role) + '</p></div>';

      function greetLine(name) {
        var h = new Date().getHours();
        var g = h < 12 ? "Good morning" : h < 18 ? "Good afternoon" : "Good evening";
        return esc(g) + ', ' + esc((name || "").split(" ")[0]) + '.';
      }
      function subLine(r) {
        if (r === "Operator") return "Here is what has come in and what needs a reply.";
        return "A full view across leads and content.";
      }

      var html = greeting;
      if (role === "Operator") {
        html += salesBlock();
      } else if (role === "Admin") {
        html += salesBlock() + '<div style="height:1.4rem"></div>' + adminLinks();
      }
      // Operator sees both leads (above) and content (via nav: Projects / Catalog).

      main.innerHTML = html;
    })();
  </script>
</body>
</html>
